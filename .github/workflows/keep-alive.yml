name: Keep API warm

# Pings the Render free-tier API every 10 minutes so it never sits idle long
# enough to spin down (Render's free tier sleeps after ~15 minutes of
# inactivity, and a cold start back up can take 50+ seconds). This is a
# stopgap for the free tier -- switch it off once the API is hosted
# somewhere that doesn't spin down.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 30 https://api.thinknbuild.in/api/healthz
